name: Execute precommits

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pre-commit:
    runs-on: [ "ubuntu-slim" ]
    name: Execute pre-commit
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        name: Install tools via mise
      - uses: pre-commit/action@v3.0.1
        name: Run pre-commit hooks
